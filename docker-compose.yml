version: "3.8"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    expose:
      - "8000"
    volumes:
      - sqlite_data:/data
    environment:
      - APP_ENV=production
      - APP_SECRET_KEY=${APP_SECRET_KEY:-cambiar-en-produccion}
      - DATABASE_PATH=/data/barqueue.db
      - YOUTUBE_API_KEY=${YOUTUBE_API_KEY:-}
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
      - MAX_SONGS_PER_WINDOW=${MAX_SONGS_PER_WINDOW:-5}
      - WINDOW_MINUTES=${WINDOW_MINUTES:-30}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 60s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    expose:
      - "80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  sqlite_data:
    driver: local
